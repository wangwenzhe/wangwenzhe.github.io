处得到的将是0:0:0:0:0:0:0:1，这是由于host文件导致的。</span><br><span class="line"> </span><br><span class="line">request.getRemoteAddr()</span><br><span class="line">返回远程主机（客户端）IP地址：123.10.23.12，同上</span><br><span class="line"> </span><br><span class="line">request.getLocalName()</span><br><span class="line">返回本地（服务端）域名，没有域名就返回IP：10.0.4.214，如果服务端和客户端在同一台机子上且使用了localhost进行访问，那么此处得到的将是0.0.0.0，这是由于host文件导致的。</span><br><span class="line"> </span><br><span class="line">request.getLocalAddr()</span><br><span class="line">返回本地（服务端）域名，没有域名就返回IP：10.0.4.214，同上</span><br><span class="line"> </span><br><span class="line">request.getLocalPort()</span><br><span class="line">返回本地（服务端）端口：8081</span><br><span class="line"> </span><br><span class="line">InetAddress.getLocalHost().getAddress()</span><br><span class="line">返回本地（服务端）IP（数组形式）：[10, 0, 2, 88] </span><br><span class="line">此处需要注意：如果服务器用的是windows那么可以正确获取到IP，但，如果服务器是linux，则只能获取到[127, 0, 0, 1] 。</span><br><span class="line"></span><br><span class="line">request.getRequestURL()</span><br><span class="line">获取请求的网址全路径：https:``//10``.0.4.214:8081``/vasportal/index``.action</span><br><span class="line"> </span><br><span class="line">request.getRequestURI()</span><br><span class="line">获取工程名和请求路径：vasportal``/index``.action</span><br><span class="line"> </span><br><span class="line">request.getContextPath()</span><br><span class="line">获取当前请求的上下文（可以理解为工程名）： ``/vasportal</span><br><span class="line"> </span><br><span class="line">request.getServletContext().getRealPath(``&quot;/temp&quot;``)</span><br><span class="line">获取项目中webapp下的temp文件夹</span><br><span class="line"> </span><br><span class="line">request.getServletPath()</span><br><span class="line">得到当前服务器servlet映射的路径：index.action</span><br><span class="line"> </span><br><span class="line">request.getProtlcol()</span><br><span class="line">得到当前请求的协议版本：HTTP1.1</span><br><span class="line"> </span><br><span class="line">request.getScheme()</span><br><span class="line">得到当前请求的协议类型：https</span><br></pre></td></tr></table></figure>

      var onloadcssdefined = function (cb) {

    },
    request: (el, url, callback, onFailure) => {
      let retryTimes = 3;
      utils.onLoading(el);
      function req() {
        return new Promise((resolve, reject) => {
          let status = 0; // 0 等待 1 完成 2 超时
          let timer = setTimeout(() => {
            if (status === 0) {
              status = 2;
              timer = null;
              reject('请求超时');
              if (retryTimes == 0) {
                onFailure();
              }
            }
          }, 5000);
          fetch(url).then(function(response) {
            if (status !== 2) {
              clearTimeout(timer);
              resolve(response);
              timer = null;
              status = 1;
            }
            if (response.ok) {
              return response.json();
            }
            throw new Error('Network response was not ok.');
          }).then(function(data) {
            retryTimes = 0;
            utils.onLoadSuccess(el);
            callback(data);
          }).catch(function(error) {
            if (retryTimes > 0) {
              retryTimes -= 1;
              setTimeout(() => {
                req();
              }, 5000);
            } else {
              utils.onLoadFailure(el);
              onFailure();
            }
          });
        });
      }
      req();
    },
  };

        ctx.cardlinks = document.querySelectorAll('a.link-card[cardlink]');
        if (ctx.cardlinks?.length > 0) {
          utils.js(js, { defer: true }).then(function () {
            setCardLink(ctx.cardlinks);
          });
        }
      } else {
        const els = document.getElementsByClassName(`ds-${id}`);
        if (els?.length > 0) {
          utils.jq(() => {
            if (id == 'timeline' || 'memos' || 'marked') {
              utils.js(deps.marked).then(function () {
                utils.js(js, { defer: true });
              });
            } else {
              utils.js(js, { defer: true });
            }
          });
        }
      }
    }
  });
</script>
